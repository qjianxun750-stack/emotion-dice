<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加测试数据</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 15px;
        }

        .btn:hover {
            background: #5568d3;
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .status {
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        .info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .info h3 {
            margin-bottom: 10px;
            color: #333;
        }

        .info ul {
            margin-left: 20px;
        }

        .info li {
            margin-bottom: 5px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎲 添加测试数据</h1>

        <div class="info">
            <h3>📋 将要添加的数据：</h3>
            <ul>
                <li>✅ 10个独立访客</li>
                <li>✅ 50次摇骰子记录</li>
                <li>✅ 8次分享记录</li>
                <li>✅ 涵盖所有8个主题骰子</li>
                <li>✅ 各个分享渠道都有数据</li>
            </ul>
        </div>

        <button class="btn" onclick="addTestData()">🚀 开始添加测试数据</button>
        <button class="btn" onclick="verifyData()" style="background: #28a745;">🔍 验证数据</button>
        <button class="btn" onclick="viewAdmin()" style="background: #17a2b8;">📊 查看全局统计</button>

        <div id="status" class="status"></div>
    </div>

    <script src="js/supabase-client.js"></script>
    <script>
        const SUPABASE_CONFIG = {
            url: 'https://xwbhgojqgyaopqlhuqqd.supabase.co',
            key: 'sb_publishable_JcgkknAzBdcpXaMCmWSBsg_ZHM3WHuu'
        };

        // 生成随机访客ID
        function generateVisitorId() {
            return 'visitor_' + Math.random().toString(36).substr(2, 9);
        }

        // 添加测试数据
        async function addTestData() {
            const btn = event.target;
            const status = document.getElementById('status');

            btn.disabled = true;
            btn.textContent = '⏳ 正在添加...';
            status.className = 'status';
            status.style.display = 'none';

            try {
                // 1. 添加10个访客
                const visitors = [];
                for (let i = 0; i < 10; i++) {
                    visitors.push({
                        visitor_id: generateVisitorId(),
                        device_type: Math.random() > 0.5 ? 'mobile' : 'desktop'
                    });
                }

                for (const visitor of visitors) {
                    await fetch(`${SUPABASE_CONFIG.url}/rest/v1/visitors`, {
                        method: 'POST',
                        headers: {
                            'apikey': SUPABASE_CONFIG.key,
                            'Authorization': `Bearer ${SUPABASE_CONFIG.key}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(visitor)
                    });
                }

                // 2. 添加50次摇骰子记录
                const diceNames = ['今日状态', '今日发疯', '今日祈愿', '今日玄学', '今日关系', '今日人生', '今日妈妈', '今日搭子'];
                const results = [
                    { word: '小爷来了', emoji: '😎', desc: '今天有气势，冲！' },
                    { word: '清醒的NPC', emoji: '🤖', desc: '今天配合，但心里明白' },
                    { word: '电量不足', emoji: '🪫', desc: '今天没能量' },
                    { word: '继续营业', emoji: '😐', desc: '今天正常运转' },
                    { word: '我爱工作', emoji: '😅', desc: '今天认命了' },
                    { word: '想消失一下', emoji: '👻', desc: '想从所有人视线里消失' },
                    { word: '想说不', emoji: '🙅', desc: '今天有一百个请求想拒绝' },
                    { word: '求个心安', emoji: '🙏', desc: '今天只求踏实' }
                ];

                const visitorIds = visitors.map((v, i) => `test_visitor_${i + 1}`);

                for (let i = 0; i < 50; i++) {
                    const diceName = diceNames[Math.floor(Math.random() * diceNames.length)];
                    const result = results[Math.floor(Math.random() * results.length)];
                    const visitorId = visitorIds[Math.floor(Math.random() * visitorIds.length)];

                    await fetch(`${SUPABASE_CONFIG.url}/rest/v1/dice_rolls`, {
                        method: 'POST',
                        headers: {
                            'apikey': SUPABASE_CONFIG.key,
                            'Authorization': `Bearer ${SUPABASE_CONFIG.key}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            visitor_id: visitorId,
                            dice_name: diceName,
                            dice_id: diceNames.indexOf(diceName).toString(),
                            result_word: result.word,
                            result_emoji: result.emoji,
                            result_desc: result.desc
                        })
                    });
                }

                // 3. 添加8次分享记录
                const shareTypes = ['wechat', 'qq', 'weibo', 'link', 'image'];
                for (let i = 0; i < 8; i++) {
                    const shareType = shareTypes[i % shareTypes.length];
                    const visitorId = visitorIds[Math.floor(Math.random() * visitorIds.length)];

                    await fetch(`${SUPABASE_CONFIG.url}/rest/v1/shares`, {
                        method: 'POST',
                        headers: {
                            'apikey': SUPABASE_CONFIG.key,
                            'Authorization': `Bearer ${SUPABASE_CONFIG.key}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            visitor_id: visitorId,
                            share_type: shareType,
                            dice_name: diceNames[Math.floor(Math.random() * diceNames.length)],
                            result_word: results[Math.floor(Math.random() * results.length)].word
                        })
                    });
                }

                status.className = 'status success';
                status.innerHTML = `
                    <h3>✅ 测试数据添加成功！</h3>
                    <p>已添加：</p>
                    <ul>
                        <li>10个独立访客</li>
                        <li>50次摇骰子记录</li>
                        <li>8次分享记录</li>
                    </ul>
                    <p style="margin-top: 15px;"><strong>点击"查看全局统计"查看数据！</strong></p>
                `;

                btn.textContent = '✅ 添加完成';

            } catch (error) {
                status.className = 'status error';
                status.innerHTML = `
                    <h3>❌ 添加失败</h3>
                    <p>错误信息：${error.message}</p>
                    <p style="margin-top: 10px;">请检查：</p>
                    <ul>
                        <li>Supabase表是否已创建</li>
                        <li>网络连接是否正常</li>
                        <li>按F12查看控制台错误</li>
                    </ul>
                `;
                btn.disabled = false;
                btn.textContent = '🚀 重试';
            }
        }

        // 验证数据
        async function verifyData() {
            const status = document.getElementById('status');
            status.className = 'status';
            status.style.display = 'none';

            try {
                const [visitors, rolls, shares] = await Promise.all([
                    fetch(`${SUPABASE_CONFIG.url}/rest/v1/visitors?select=id`, {
                        headers: { 'apikey': SUPABASE_CONFIG.key, 'Authorization': `Bearer ${SUPABASE_CONFIG.key}` }
                    }),
                    fetch(`${SUPABASE_CONFIG.url}/rest/v1/dice_rolls?select=id`, {
                        headers: { 'apikey': SUPABASE_CONFIG.key, 'Authorization': `Bearer ${SUPABASE_CONFIG.key}` }
                    }),
                    fetch(`${SUPABASE_CONFIG.url}/rest/v1/shares?select=id`, {
                        headers: { 'apikey': SUPABASE_CONFIG.key, 'Authorization': `Bearer ${SUPABASE_CONFIG.key}` }
                    })
                ]);

                const visitorsData = await visitors.json();
                const rollsData = await rolls.json();
                const sharesData = await shares.json();

                status.className = 'status success';
                status.style.display = 'block';
                status.innerHTML = `
                    <h3>📊 当前数据统计</h3>
                    <ul>
                        <li>独立访客数：<strong>${visitorsData.length}</strong></li>
                        <li>摇骰子次数：<strong>${rollsData.length}</strong></li>
                        <li>分享次数：<strong>${sharesData.length}</strong></li>
                    </ul>
                `;

            } catch (error) {
                status.className = 'status error';
                status.style.display = 'block';
                status.innerHTML = `<p>❌ 验证失败：${error.message}</p>`;
            }
        }

        // 查看全局统计
        function viewAdmin() {
            window.location.href = 'global-admin.html';
        }
    </script>
</body>
</html>
