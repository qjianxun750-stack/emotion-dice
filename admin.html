<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>情绪骰子 - 数据统计后台</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        
        .admin-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .admin-header h1 {
            font-size: 32px;
            color: white;
            margin-bottom: 10px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .stat-number {
            font-size: 48px;
            font-weight: 900;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        
        .stat-label {
            font-size: 16px;
            color: #666;
            font-weight: 500;
        }
        
        .section {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .section h2 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #333;
        }
        
        .chart-bar {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .chart-label {
            width: 120px;
            font-size: 14px;
            color: #666;
        }
        
        .chart-bar-fill {
            flex: 1;
            height: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            color: white;
            font-weight: bold;
            font-size: 14px;
            transition: width 0.5s ease;
        }
        
        .daily-chart {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            height: 200px;
            padding: 20px 0;
        }
        
        .daily-bar {
            flex: 1;
            background: linear-gradient(to top, #667eea, #764ba2);
            border-radius: 8px 8px 0 0;
            min-height: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 5px;
            color: white;
            font-size: 12px;
            font-weight: bold;
        }
        
        .daily-bar-label {
            margin-top: 10px;
            font-size: 12px;
            color: white;
            text-align: center;
        }
        
        .admin-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 40px;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1>📊 数据统计后台</h1>
            <p style="color: white; opacity: 0.9;">实时查看使用情况</p>
        </div>
        
        <!-- 总览数据 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="totalVisits">0</div>
                <div class="stat-label">总访问次数</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalRolls">0</div>
                <div class="stat-label">总摇骰次数</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalShares">0</div>
                <div class="stat-label">总分享次数</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="conversionRate">0%</div>
                <div class="stat-label">分享转化率</div>
            </div>
        </div>
        
        <!-- 热门骰子 -->
        <div class="section">
            <h2>🎲 热门骰子 TOP 8</h2>
            <div id="topDice"></div>
        </div>
        
        <!-- 热门结果 -->
        <div class="section">
            <h2>🏆 热门结果 TOP 10</h2>
            <div id="topResults"></div>
        </div>
        
        <!-- 每日访问趋势 -->
        <div class="section">
            <h2>📈 近7日访问趋势</h2>
            <div id="dailyVisits" class="daily-chart"></div>
        </div>
        
        <!-- 每日摇骰趋势 -->
        <div class="section">
            <h2>🎯 近7日摇骰趋势</h2>
            <div id="dailyRolls" class="daily-chart"></div>
        </div>
        
        <!-- 操作按钮 -->
        <div class="admin-actions">
            <button class="btn btn-primary" onclick="refreshStats()">🔄 刷新数据</button>
            <button class="btn btn-secondary" onclick="StatsController.reset()">🗑️ 重置数据</button>
            <button class="btn btn-secondary" onclick="window.location.href='index.html'">🏠 返回首页</button>
        </div>
    </div>
    
    <script src="js/stats.js"></script>
    <script>
        // 初始化
        StatsController.init();
        
        // 显示统计数据
        function displayStats() {
            const stats = StatsController.getStats();
            
            // 更新总览
            document.getElementById('totalVisits').textContent = stats.totalVisits;
            document.getElementById('totalRolls').textContent = stats.totalRolls;
            document.getElementById('totalShares').textContent = stats.totalShares;
            
            // 计算分享转化率
            const conversionRate = stats.totalRolls > 0 
                ? ((stats.totalShares / stats.totalRolls) * 100).toFixed(1) 
                : 0;
            document.getElementById('conversionRate').textContent = conversionRate + '%';
            
            // 显示热门骰子
            displayTopDice();
            
            // 显示热门结果
            displayTopResults();
            
            // 显示每日趋势
            displayDailyTrends();
        }
        
        // 显示热门骰子
        function displayTopDice() {
            const topDice = StatsController.getTopDice(8);
            const container = document.getElementById('topDice');
            
            if (topDice.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🎲</div><p>暂无数据</p></div>';
                return;
            }
            
            const maxCount = topDice[0].count;
            container.innerHTML = topDice.map(dice => `
                <div class="chart-bar">
                    <div class="chart-label">${dice.name}</div>
                    <div class="chart-bar-fill" style="width: ${(dice.count / maxCount * 100)}%">
                        ${dice.count}次
                    </div>
                </div>
            `).join('');
        }
        
        // 显示热门结果
        function displayTopResults() {
            const topResults = StatsController.getTopResults(10);
            const container = document.getElementById('topResults');
            
            if (topResults.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🏆</div><p>暂无数据</p></div>';
                return;
            }
            
            const maxCount = topResults[0].count;
            container.innerHTML = topResults.map(result => `
                <div class="chart-bar">
                    <div class="chart-label">${result.word}</div>
                    <div class="chart-bar-fill" style="width: ${(result.count / maxCount * 100)}%">
                        ${result.count}次
                    </div>
                </div>
            `).join('');
        }
        
        // 显示每日趋势
        function displayDailyTrends() {
            const stats = StatsController.getStats();
            
            // 获取近7天数据
            const days = [];
            for (let i = 6; i >= 0; i--) {
                const date = new Date();
                date.setDate(date.getDate() - i);
                const dateStr = date.toISOString().split('T')[0];
                days.push({
                    date: dateStr,
                    label: `${date.getMonth() + 1}/${date.getDate()}`,
                    visits: stats.dailyVisits[dateStr] || 0,
                    rolls: stats.dailyRolls[dateStr] || 0
                });
            }
            
            // 显示访问趋势
            const maxVisits = Math.max(...days.map(d => d.visits), 1);
            const visitsContainer = document.getElementById('dailyVisits');
            visitsContainer.innerHTML = days.map(day => `
                <div style="flex: 1; display: flex; flex-direction: column; align-items: center;">
                    <div class="daily-bar" style="height: ${(day.visits / maxVisits * 100)}%">
                        ${day.visits > 0 ? day.visits : ''}
                    </div>
                    <div class="daily-bar-label">${day.label}</div>
                </div>
            `).join('');
            
            // 显示摇骰趋势
            const maxRolls = Math.max(...days.map(d => d.rolls), 1);
            const rollsContainer = document.getElementById('dailyRolls');
            rollsContainer.innerHTML = days.map(day => `
                <div style="flex: 1; display: flex; flex-direction: column; align-items: center;">
                    <div class="daily-bar" style="height: ${(day.rolls / maxRolls * 100)}%">
                        ${day.rolls > 0 ? day.rolls : ''}
                    </div>
                    <div class="daily-bar-label">${day.label}</div>
                </div>
            `).join('');
        }
        
        // 刷新数据
        function refreshStats() {
            StatsController.loadData();
            displayStats();
        }
        
        // 初始显示
        displayStats();
        
        // 每30秒自动刷新
        setInterval(refreshStats, 30000);
    </script>
</body>
</html>
