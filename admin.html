<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>情绪骰子 - 数据统计后台</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .admin-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .admin-header h1 {
            font-size: 32px;
            color: white;
            margin-bottom: 10px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .stat-number {
            font-size: 40px;
            font-weight: 900;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .stat-label {
            font-size: 14px;
            color: #666;
            font-weight: 500;
        }

        .section {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .section h2 {
            font-size: 20px;
            margin-bottom: 20px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chart-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .chart-bar {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .chart-label {
            width: 100px;
            font-size: 14px;
            color: #666;
        }

        .chart-bar-fill {
            flex: 1;
            height: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            color: white;
            font-weight: bold;
            font-size: 14px;
            transition: width 0.5s ease;
        }

        .daily-chart {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            height: 200px;
            padding: 20px 0;
        }

        .daily-bar {
            flex: 1;
            background: linear-gradient(to top, #667eea, #764ba2);
            border-radius: 8px 8px 0 0;
            min-height: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 5px;
            color: white;
            font-size: 12px;
            font-weight: bold;
        }

        .daily-bar-label {
            margin-top: 10px;
            font-size: 12px;
            color: white;
            text-align: center;
        }

        .admin-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .share-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .share-stat-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
        }

        .share-stat-number {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .share-stat-label {
            font-size: 12px;
            opacity: 0.9;
        }

        .info-box {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .info-box strong {
            display: block;
            margin-bottom: 10px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1>📊 数据统计后台</h1>
            <p style="color: white; opacity: 0.9;">实时查看使用情况</p>
        </div>

        <!-- 说明信息 -->
        <div class="info-box">
            <strong>💡 统计说明</strong>
            <p>• 本统计基于本地浏览器数据，展示当前设备的使用情况</p>
            <p>• 访问量：页面打开次数 | 独立访客：不同用户数量 | 分享：所有分享行为统计</p>
        </div>

        <!-- 总览数据 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="totalVisits">0</div>
                <div class="stat-label">总访问次数</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="uniqueVisitors">0</div>
                <div class="stat-label">独立访客数</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalRolls">0</div>
                <div class="stat-label">总摇骰次数</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalShares">0</div>
                <div class="stat-label">总分享次数</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="shareRate">0%</div>
                <div class="stat-label">分享转化率</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="avgSessionTime">0分</div>
                <div class="stat-label">平均使用时长</div>
            </div>
        </div>

        <!-- 分享详情统计 -->
        <div class="section">
            <h2>📤 分享渠道统计</h2>
            <div class="share-stats" id="shareStats">
                <div class="share-stat-item">
                    <div class="share-stat-number" id="shareWechat">0</div>
                    <div class="share-stat-label">💬 微信</div>
                </div>
                <div class="share-stat-item">
                    <div class="share-stat-number" id="shareQQ">0</div>
                    <div class="share-stat-label">🐧 QQ</div>
                </div>
                <div class="share-stat-item">
                    <div class="share-stat-number" id="shareWeibo">0</div>
                    <div class="share-stat-label">📢 微博</div>
                </div>
                <div class="share-stat-item">
                    <div class="share-stat-number" id="shareLink">0</div>
                    <div class="share-stat-label">🔗 复制链接</div>
                </div>
                <div class="share-stat-item">
                    <div class="share-stat-number" id="shareImage">0</div>
                    <div class="share-stat-label">🖼️ 生成图片</div>
                </div>
            </div>
        </div>

        <!-- 设备统计 -->
        <div class="section">
            <h2>📱 设备类型统计</h2>
            <div class="share-stats" id="deviceStats">
                <div class="share-stat-item">
                    <div class="share-stat-number" id="deviceMobile">0</div>
                    <div class="share-stat-label">📱 手机</div>
                </div>
                <div class="share-stat-item">
                    <div class="share-stat-number" id="deviceDesktop">0</div>
                    <div class="share-stat-label">💻 电脑</div>
                </div>
                <div class="share-stat-item">
                    <div class="share-stat-number" id="deviceTablet">0</div>
                    <div class="share-stat-label">📲 平板</div>
                </div>
            </div>
        </div>

        <div class="chart-grid">
            <!-- 热门骰子 -->
            <div class="section">
                <h2>🎲 热门骰子 TOP 8</h2>
                <div id="topDice"></div>
            </div>

            <!-- 热门结果 -->
            <div class="section">
                <h2>🏆 热门结果 TOP 10</h2>
                <div id="topResults"></div>
            </div>
        </div>

        <div class="chart-grid">
            <!-- 每日访问趋势 -->
            <div class="section">
                <h2>📈 近7日访问趋势</h2>
                <div id="dailyVisits" class="daily-chart"></div>
            </div>

            <!-- 每日摇骰趋势 -->
            <div class="section">
                <h2>🎯 近7日摇骰趋势</h2>
                <div id="dailyRolls" class="daily-chart"></div>
            </div>
        </div>

        <!-- 操作按钮 -->
        <div class="admin-actions">
            <button class="btn btn-primary" onclick="refreshStats()">🔄 刷新数据</button>
            <button class="btn btn-secondary" onclick="exportData()">📥 导出数据</button>
            <button class="btn btn-secondary" onclick="StatsController.reset()">🗑️ 重置数据</button>
            <button class="btn btn-secondary" onclick="window.location.href='index.html'">🏠 返回首页</button>
        </div>
    </div>
    
    <script src="js/stats.js"></script>
    <script src="js/analytics.js"></script>
    <script>
        // 初始化
        EnhancedStats.init();

        // 显示统计数据
        function displayStats() {
            const stats = EnhancedStats.getStats();
            const overview = EnhancedStats.getOverview();

            // 更新总览
            document.getElementById('totalVisits').textContent = overview.totalVisits;
            document.getElementById('uniqueVisitors').textContent = overview.uniqueVisitors;
            document.getElementById('totalRolls').textContent = overview.totalRolls;
            document.getElementById('totalShares').textContent = overview.totalShares;
            document.getElementById('shareRate').textContent = overview.shareRate + '%';
            document.getElementById('avgSessionTime').textContent = overview.avgSessionTime + '分';

            // 显示分享统计
            displayShareStats();

            // 显示设备统计
            displayDeviceStats();

            // 显示热门骰子
            displayTopDice();

            // 显示热门结果
            displayTopResults();

            // 显示每日趋势
            displayDailyTrends();
        }

        // 显示分享统计
        function displayShareStats() {
            const shareStats = EnhancedStats.getShareStats();
            document.getElementById('shareWechat').textContent = shareStats.wechat || 0;
            document.getElementById('shareQQ').textContent = shareStats.qq || 0;
            document.getElementById('shareWeibo').textContent = shareStats.weibo || 0;
            document.getElementById('shareLink').textContent = shareStats.link || 0;
            document.getElementById('shareImage').textContent = shareStats.image || 0;
        }

        // 显示设备统计
        function displayDeviceStats() {
            const deviceStats = EnhancedStats.getDeviceStats();
            document.getElementById('deviceMobile').textContent = deviceStats.mobile || 0;
            document.getElementById('deviceDesktop').textContent = deviceStats.desktop || 0;
            document.getElementById('deviceTablet').textContent = deviceStats.tablet || 0;
        }

        // 显示热门骰子
        function displayTopDice() {
            const topDice = EnhancedStats.getTopDice(8);
            const container = document.getElementById('topDice');

            if (topDice.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🎲</div><p>暂无数据</p></div>';
                return;
            }

            const maxCount = topDice[0].count;
            container.innerHTML = topDice.map(dice => `
                <div class="chart-bar">
                    <div class="chart-label">${dice.name}</div>
                    <div class="chart-bar-fill" style="width: ${(dice.count / maxCount * 100)}%">
                        ${dice.count}次
                    </div>
                </div>
            `).join('');
        }

        // 显示热门结果
        function displayTopResults() {
            const topResults = EnhancedStats.getTopResults(10);
            const container = document.getElementById('topResults');

            if (topResults.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🏆</div><p>暂无数据</p></div>';
                return;
            }

            const maxCount = topResults[0].count;
            container.innerHTML = topResults.map(result => `
                <div class="chart-bar">
                    <div class="chart-label">${result.word}</div>
                    <div class="chart-bar-fill" style="width: ${(result.count / maxCount * 100)}%">
                        ${result.count}次
                    </div>
                </div>
            `).join('');
        }

        // 显示每日趋势
        function displayDailyTrends() {
            const trends = EnhancedStats.getTrends();

            // 显示访问趋势
            const maxVisits = Math.max(...trends.map(d => d.visits), 1);
            const visitsContainer = document.getElementById('dailyVisits');
            visitsContainer.innerHTML = trends.map(day => `
                <div style="flex: 1; display: flex; flex-direction: column; align-items: center;">
                    <div class="daily-bar" style="height: ${(day.visits / maxVisits * 100)}%">
                        ${day.visits > 0 ? day.visits : ''}
                    </div>
                    <div class="daily-bar-label">${day.label}</div>
                </div>
            `).join('');

            // 显示摇骰趋势
            const maxRolls = Math.max(...trends.map(d => d.rolls), 1);
            const rollsContainer = document.getElementById('dailyRolls');
            rollsContainer.innerHTML = trends.map(day => `
                <div style="flex: 1; display: flex; flex-direction: column; align-items: center;">
                    <div class="daily-bar" style="height: ${(day.rolls / maxRolls * 100)}%">
                        ${day.rolls > 0 ? day.rolls : ''}
                    </div>
                    <div class="daily-bar-label">${day.label}</div>
                </div>
            `).join('');
        }

        // 刷新数据
        function refreshStats() {
            EnhancedStats.loadData();
            displayStats();
        }

        // 导出数据
        function exportData() {
            EnhancedStats.exportData();
        }

        // 初始显示
        displayStats();

        // 每30秒自动刷新
        setInterval(refreshStats, 30000);
    </script>
</body>
</html>
