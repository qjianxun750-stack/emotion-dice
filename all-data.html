<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据管理中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(-45deg, #667eea, #764ba2, #f093fb, #f5576c);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .stat-card .number {
            font-size: 36px;
            font-weight: bold;
            color: #667eea;
        }

        .stat-card .label {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            color: #333;
        }

        .tab-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }

        .content-area {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
            min-height: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 13px;
        }

        .data-table th,
        .data-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        .data-table th {
            background: #f8f9fa;
            font-weight: 600;
            position: sticky;
            top: 0;
        }

        .data-table tr:hover {
            background: #f5f5f5;
        }

        .btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s;
            margin: 5px;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .btn-success {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
        }

        .btn-danger {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: #666;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .alert {
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .filter-bar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-bar input,
        .filter-bar select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        .emoji {
            font-size: 20px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 数据管理中心</h1>
            <p>查看所有数据 | 实时同步 | 一站管理</p>

            <div class="stats-row" id="statsRow">
                <div class="stat-card">
                    <div class="number" id="visitorsCount">-</div>
                    <div class="label">独立访客</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="rollsCount">-</div>
                    <div class="label">摇骰次数</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="sharesCount">-</div>
                    <div class="label">分享次数</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="conversionRate">-%</div>
                    <div class="label">转化率</div>
                </div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('rolls')">🎲 摇骰记录</button>
            <button class="tab-btn" onclick="switchTab('shares')">📤 分享记录</button>
            <button class="tab-btn" onclick="switchTab('visitors')">👥 访客记录</button>
        </div>

        <div class="content-area">
            <div id="alertBox"></div>

            <div class="toolbar">
                <h3 id="tabTitle">🎲 摇骰记录</h3>
                <div>
                    <button class="btn btn-success" onclick="addTestData()">🚀 添加测试数据</button>
                    <button class="btn" onclick="loadData()">🔄 刷新</button>
                </div>
            </div>

            <div id="rollsTab">
                <div class="filter-bar">
                    <input type="text" id="searchRolls" placeholder="搜索结果..." oninput="filterData()">
                </div>
                <div id="rollsContent" class="loading">加载中...</div>
            </div>

            <div id="sharesTab" class="hidden">
                <div class="filter-bar">
                    <select id="filterShare" onchange="filterData()">
                        <option value="">所有渠道</option>
                        <option value="wechat">微信</option>
                        <option value="qq">QQ</option>
                        <option value="weibo">微博</option>
                        <option value="link">复制链接</option>
                        <option value="image">生成图片</option>
                    </select>
                </div>
                <div id="sharesContent" class="loading">加载中...</div>
            </div>

            <div id="visitorsTab" class="hidden">
                <div id="visitorsContent" class="loading">加载中...</div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_CONFIG = {
            url: 'https://xwbhgojqgyaopqlhuqqd.supabase.co',
            key: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh3Ymhnb2pxZ3lhb3BxbGh1cXFkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4OTM3NTUsImV4cCI6MjA5MjQ2OTc1NX0.vOFf9Td2Id-fUC12SCOxMNwtaSScM9crDDCDLe7d8sU'
        };

        let allData = {
            visitors: [],
            rolls: [],
            shares: []
        };
        let currentTab = 'rolls';

        window.onload = function() {
            loadData();
        };

        function switchTab(tab) {
            currentTab = tab;

            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            const titles = {
                'rolls': '🎲 摇骰记录',
                'shares': '📤 分享记录',
                'visitors': '👥 访客记录'
            };
            document.getElementById('tabTitle').textContent = titles[tab];

            ['rolls', 'shares', 'visitors'].forEach(t => {
                document.getElementById(t + 'Tab').classList.add('hidden');
            });
            document.getElementById(tab + 'Tab').classList.remove('hidden');

            displayData(tab);
        }

        async function loadData() {
            showAlert('正在加载数据...', 'warning');

            try {
                const [visitors, rolls, shares] = await Promise.all([
                    fetchFromSupabase('visitors'),
                    fetchFromSupabase('dice_rolls'),
                    fetchFromSupabase('shares')
                ]);

                allData.visitors = visitors || [];
                allData.rolls = rolls || [];
                allData.shares = shares || [];

                updateStats();
                displayData(currentTab);

                const total = allData.visitors.length + allData.rolls.length + allData.shares.length;
                if (total === 0) {
                    showAlert('数据库为空，点击"添加测试数据"按钮添加数据', 'warning');
                } else {
                    showAlert(`✅ 数据加载成功！共 ${total} 条记录`, 'success');
                    setTimeout(() => hideAlert(), 3000);
                }

            } catch (error) {
                console.error('加载失败:', error);
                showAlert(`❌ 加载失败：${error.message}。请检查RLS策略配置`, 'error');
            }
        }

        async function fetchFromSupabase(table) {
            try {
                const response = await fetch(`${SUPABASE_CONFIG.url}/rest/v1/${table}?order=created_at.desc&limit=1000`, {
                    headers: {
                        'apikey': SUPABASE_CONFIG.key,
                        'Authorization': `Bearer ${SUPABASE_CONFIG.key}`
                    }
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                return await response.json();
            } catch (error) {
                console.error(`获取 ${table} 失败:`, error);
                return [];
            }
        }

        function updateStats() {
            document.getElementById('visitorsCount').textContent = allData.visitors.length;
            document.getElementById('rollsCount').textContent = allData.rolls.length;
            document.getElementById('sharesCount').textContent = allData.shares.length;

            const rate = allData.rolls.length > 0
                ? ((allData.shares.length / allData.rolls.length) * 100).toFixed(1)
                : 0;
            document.getElementById('conversionRate').textContent = rate + '%';
        }

        function displayData(tab) {
            const container = document.getElementById(tab + 'Content');
            const data = allData[tab] || [];

            if (data.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <p>暂无数据</p>
                        <p style="font-size: 12px; margin-top: 10px;">点击上方"添加测试数据"按钮</p>
                    </div>
                `;
                return;
            }

            let html = '<table class="data-table"><thead><tr>';

            if (tab === 'rolls') {
                html += '<th>时间</th><th>访客ID</th><th>主题</th><th>结果</th><th>emoji</th>';
            } else if (tab === 'shares') {
                html += '<th>时间</th><th>访客ID</th><th>渠道</th><th>主题</th><th>结果</th>';
            } else if (tab === 'visitors') {
                html += '<th>首次访问</th><th>访客ID</th><th>设备</th><th>最后访问</th>';
            }

            html += '</tr></thead><tbody>';

            data.forEach(item => {
                html += '<tr>';

                if (tab === 'rolls') {
                    const time = new Date(item.created_at).toLocaleString('zh-CN');
                    html += `
                        <td>${time}</td>
                        <td><span style="font-size: 11px; color: #999;">${item.visitor_id.substring(0, 15)}...</span></td>
                        <td>${item.dice_name}</td>
                        <td>${item.result_word}</td>
                        <td>${item.result_emoji}</td>
                    `;
                } else if (tab === 'shares') {
                    const time = new Date(item.created_at).toLocaleString('zh-CN');
                    const names = { wechat: '微信', qq: 'QQ', weibo: '微博', link: '链接', image: '图片' };
                    html += `
                        <td>${time}</td>
                        <td><span style="font-size: 11px; color: #999;">${item.visitor_id.substring(0, 15)}...</span></td>
                        <td>${names[item.share_type] || item.share_type}</td>
                        <td>${item.dice_name || '-'}</td>
                        <td>${item.result_word || '-'}</td>
                    `;
                } else if (tab === 'visitors') {
                    const first = new Date(item.first_visit).toLocaleString('zh-CN');
                    const last = new Date(item.last_visit).toLocaleString('zh-CN');
                    const names = { mobile: '手机', desktop: '电脑' };
                    html += `
                        <td>${first}</td>
                        <td><span style="font-size: 11px; color: #999;">${item.visitor_id.substring(0, 15)}...</span></td>
                        <td>${names[item.device_type] || item.device_type}</td>
                        <td>${last}</td>
                    `;
                }

                html += '</tr>';
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function filterData() {
            // 简化版筛选
            displayData(currentTab);
        }

        async function addTestData() {
            if (!confirm('确定要添加测试数据吗？\n\n将添加：\n• 10个访客\n• 50次摇骰子\n• 8次分享')) {
                return;
            }

            showAlert('正在添加测试数据，请稍候...', 'warning');

            const visitorIds = [];
            for (let i = 0; i < 10; i++) {
                const visitorId = 'test_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                visitorIds.push(visitorId);

                try {
                    await fetch(`${SUPABASE_CONFIG.url}/rest/v1/visitors`, {
                        method: 'POST',
                        headers: {
                            'apikey': SUPABASE_CONFIG.key,
                            'Authorization': `Bearer ${SUPABASE_CONFIG.key}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            visitor_id: visitorId,
                            device_type: Math.random() > 0.5 ? 'mobile' : 'desktop'
                        })
                    });
                } catch (e) {
                    console.error('添加访客失败:', e);
                }
            }

            const diceNames = ['今日状态', '今日发疯', '今日祈愿', '今日玄学', '今日关系', '今日人生', '今日妈妈', '今日搭子'];
            const results = [
                { word: '小爷来了', emoji: '😎' },
                { word: '清醒的NPC', emoji: '🤖' },
                { word: '电量不足', emoji: '🪫' },
                { word: '继续营业', emoji: '😐' },
                { word: '我爱工作', emoji: '😅' }
            ];

            for (let i = 0; i < 50; i++) {
                try {
                    await fetch(`${SUPABASE_CONFIG.url}/rest/v1/dice_rolls`, {
                        method: 'POST',
                        headers: {
                            'apikey': SUPABASE_CONFIG.key,
                            'Authorization': `Bearer ${SUPABASE_CONFIG.key}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            visitor_id: visitorIds[Math.floor(Math.random() * visitorIds.length)],
                            dice_name: diceNames[Math.floor(Math.random() * diceNames.length)],
                            dice_id: '0',
                            result_word: results[Math.floor(Math.random() * results.length)].word,
                            result_emoji: results[Math.floor(Math.random() * results.length)].emoji,
                            result_desc: '测试数据'
                        })
                    });
                } catch (e) {
                    console.error('添加摇骰子失败:', e);
                }
            }

            const shareTypes = ['wechat', 'qq', 'weibo', 'link', 'image'];
            for (let i = 0; i < 8; i++) {
                try {
                    await fetch(`${SUPABASE_CONFIG.url}/rest/v1/shares`, {
                        method: 'POST',
                        headers: {
                            'apikey': SUPABASE_CONFIG.key,
                            'Authorization': `Bearer ${SUPABASE_CONFIG.key}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            visitor_id: visitorIds[Math.floor(Math.random() * visitorIds.length)],
                            share_type: shareTypes[i % shareTypes.length],
                            dice_name: diceNames[Math.floor(Math.random() * diceNames.length)],
                            result_word: results[Math.floor(Math.random() * results.length)].word
                        })
                    });
                } catch (e) {
                    console.error('添加分享失败:', e);
                }
            }

            showAlert('✅ 测试数据添加完成！正在刷新...', 'success');
            setTimeout(() => loadData(), 1000);
        }

        function showAlert(message, type = 'info') {
            const alertBox = document.getElementById('alertBox');
            alertBox.className = `alert alert-${type}`;
            alertBox.innerHTML = message;
            alertBox.style.display = 'block';
        }

        function hideAlert() {
            document.getElementById('alertBox').style.display = 'none';
        }
    </script>
</body>
</html>
