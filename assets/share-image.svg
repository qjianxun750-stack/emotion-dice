<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>

    <!-- 骰子渐变 -->
    <linearGradient id="diceGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>

    <!-- 辉光效果 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景矩形 -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- 星星装饰 -->
  <circle cx="100" cy="100" r="3" fill="white" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1100" cy="150" r="2" fill="white" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="500" r="2.5" fill="white" opacity="0.5">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1000" cy="450" r="3" fill="white" opacity="0.7">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="1.8s" repeatCount="indefinite"/>
  </circle>

  <!-- 大标题 -->
  <text x="600" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white" filter="url(#glow)">
    🎲 情绪骰子
  </text>

  <text x="600" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" fill="white" opacity="0.9">
    摇一摇，看今天什么状态
  </text>

  <!-- 骰子图标 (立方体) -->
  <g transform="translate(600, 350)">
    <!-- 骰子主体 -->
    <rect x="-80" y="-80" width="160" height="160" rx="20" fill="url(#diceGradient)" filter="url(#glow)"/>

    <!-- 骰子点数 -->
    <circle cx="-30" cy="-30" r="12" fill="white" opacity="0.9"/>
    <circle cx="30" cy="-30" r="12" fill="white" opacity="0.9"/>
    <circle cx="0" cy="0" r="12" fill="white" opacity="0.9"/>
    <circle cx="-30" cy="30" r="12" fill="white" opacity="0.9"/>
    <circle cx="30" cy="30" r="12" fill="white" opacity="0.9"/>

    <!-- 问号 -->
    <text x="0" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="white" opacity="0.3">
      ?
    </text>
  </g>

  <!-- 8个骰子主题标签 -->
  <g transform="translate(600, 500)">
    <text x="-350" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="white" opacity="0.8">今日状态</text>
    <text x="-250" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="white" opacity="0.8">发疯</text>
    <text x="-150" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="white" opacity="0.8">祈愿</text>
    <text x="-50" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="white" opacity="0.8">玄学</text>
    <text x="50" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="white" opacity="0.8">关系</text>
    <text x="150" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="white" opacity="0.8">人生</text>
    <text x="250" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="white" opacity="0.8">妈妈</text>
    <text x="350" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="white" opacity="0.8">搭子</text>
  </g>

  <!-- 底部网址 -->
  <text x="600" y="600" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="white" opacity="0.7">
    emotion-dice.vercel.app
  </text>

  <!-- 装饰圆圈 -->
  <circle cx="100" cy="315" r="80" fill="white" opacity="0.05"/>
  <circle cx="1100" cy="315" r="60" fill="white" opacity="0.05"/>
</svg>