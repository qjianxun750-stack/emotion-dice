<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试Supabase连接</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .test-item {
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
        }
        .pending {
            background: #fff3cd;
            color: #856404;
        }
    </style>
</head>
<body>
    <h1>🧪 Supabase连接测试</h1>
    <div id="results"></div>

    <script>
        const SUPABASE_CONFIG = {
            url: 'https://xwbhgojqgyaopqlhuqqd.supabase.co',
            key: 'sb_publishable_JcgkknAzBdcpXaMCmWSBsg_ZHM3WHuu'
        };

        const results = document.getElementById('results');

        function addResult(message, status) {
            const div = document.createElement('div');
            div.className = `test-item ${status}`;
            div.innerHTML = message;
            results.appendChild(div);
        }

        async function testConnection() {
            addResult('⏳ 开始测试Supabase连接...', 'pending');

            // 测试1：访问visitors表
            try {
                const response = await fetch(`${SUPABASE_CONFIG.url}/rest/v1/visitors?limit=1`, {
                    headers: {
                        'apikey': SUPABASE_CONFIG.key,
                        'Authorization': `Bearer ${SUPABASE_CONFIG.key}`
                    }
                });

                if (response.ok) {
                    addResult('✅ visitors表连接成功！', 'success');
                } else {
                    addResult(`❌ visitors表错误: ${response.status}`, 'error');
                }
            } catch (error) {
                addResult(`❌ visitors表失败: ${error.message}`, 'error');
            }

            // 测试2：访问dice_rolls表
            try {
                const response = await fetch(`${SUPABASE_CONFIG.url}/rest/v1/dice_rolls?limit=1`, {
                    headers: {
                        'apikey': SUPABASE_CONFIG.key,
                        'Authorization': `Bearer ${SUPABASE_CONFIG.key}`
                    }
                });

                if (response.ok) {
                    addResult('✅ dice_rolls表连接成功！', 'success');
                } else {
                    addResult(`❌ dice_rolls表错误: ${response.status}`, 'error');
                }
            } catch (error) {
                addResult(`❌ dice_rolls表失败: ${error.message}`, 'error');
            }

            // 测试3：访问shares表
            try {
                const response = await fetch(`${SUPABASE_CONFIG.url}/rest/v1/shares?limit=1`, {
                    headers: {
                        'apikey': SUPABASE_CONFIG.key,
                        'Authorization': `Bearer ${SUPABASE_CONFIG.key}`
                    }
                });

                if (response.ok) {
                    addResult('✅ shares表连接成功！', 'success');
                } else {
                    addResult(`❌ shares表错误: ${response.status}`, 'error');
                }
            } catch (error) {
                addResult(`❌ shares表失败: ${error.message}`, 'error');
            }

            addResult('<br>🎉 如果全部显示✅，说明表创建成功！现在可以访问全局统计页面了：<br><a href="https://qjianxun750-stack.github.io/emotion-dice/global-admin.html" target="_blank">📊 全局数据统计</a>', 'success');
        }

        testConnection();
    </script>
</body>
</html>
